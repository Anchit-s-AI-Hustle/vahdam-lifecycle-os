<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vahdam Agent — talk to our tea &amp; wellness expert</title>
<style>
  :root { --green:#004A2B; --gold:#AB8743; --ink:#171717; --cream:#FBF5EA; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--cream); font-family:'Proxima Nova','Helvetica Neue',Arial,sans-serif; color:var(--ink); }
  .shell { max-width:880px; margin:0 auto; padding:26px 18px 120px; }
  h1 { font-family:'Lao MN','Cormorant Garamond',Georgia,serif; color:var(--green); font-size:30px; margin:8px 0 4px; }
  .sub { color:#6b6b6b; font-size:14px; margin-bottom:18px; }
  .agentbar { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 22px; }
  .agentchip { border:1.5px solid var(--gold); background:#fff; color:var(--ink); padding:9px 16px; border-radius:999px; font-size:13px; cursor:pointer; transition:all .18s; }
  .agentchip:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,74,43,.18); }
  .agentchip.active { background:var(--green); color:var(--cream); border-color:var(--green); }
  .chat { background:#fff; border:1px solid rgba(171,135,67,.35); border-radius:18px; min-height:420px; max-height:58vh; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:78%; padding:13px 17px; border-radius:16px; font-size:14.5px; line-height:1.6; animation:pop .35s ease; white-space:pre-wrap; }
  @keyframes pop { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:none} }
  .msg.user { align-self:flex-end; background:var(--green); color:var(--cream); border-bottom-right-radius:4px; }
  .msg.agent { align-self:flex-start; background:var(--cream); border:1px solid rgba(171,135,67,.3); border-bottom-left-radius:4px; }
  .msg.agent a { color:var(--green); font-weight:600; }
  .speaking { box-shadow:0 0 0 2px var(--gold); }
  .inputrow { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(transparent, var(--cream) 30%); padding:18px; }
  @media (min-width:961px){ .inputrow{ left:var(--lsb-w,248px); } }
  .inputbox { max-width:860px; margin:0 auto; display:flex; gap:10px; background:#fff; border:1.5px solid var(--gold); border-radius:16px; padding:10px 12px; box-shadow:0 14px 40px rgba(0,74,43,.14); }
  .inputbox input { flex:1; border:none; outline:none; font-size:15px; font-family:inherit; background:transparent; }
  .btn { border:none; border-radius:11px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .15s; }
  .btn:hover { transform:translateY(-1px); }
  .btn.send { background:var(--green); color:var(--cream); }
  .btn.mic { background:var(--cream); border:1.5px solid var(--gold); color:var(--green); min-width:46px; }
  .btn.mic.listening { background:#c0392b; color:#fff; border-color:#c0392b; animation:pulse 1.2s infinite; }
  @keyframes pulse { 50%{opacity:.6} }
  .toggles { display:flex; gap:14px; align-items:center; max-width:860px; margin:8px auto 0; font-size:12px; color:#6b6b6b; justify-content:flex-end; }
  .toggles label { cursor:pointer; display:flex; gap:5px; align-items:center; }
  .typing { align-self:flex-start; color:#999; font-size:13px; font-style:italic; }
</style>
</head>
<body>
<div class="shell">
  <div style="font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:700">VAHDAM · Voice &amp; Chat Concierge</div>
  <h1>Talk to a Vahdam expert</h1>
  <div class="sub">Ask about benefits, brewing, how long results take, or whether a blend is worth it — by voice or text. Honest answers, zero pressure. Pick a specialist:</div>
  <div class="agentbar" id="agentbar"></div>
  <div class="chat" id="chat"></div>
</div>
<div class="inputrow">
  <div class="inputbox">
    <button class="btn mic" id="mic" title="Hold a voice conversation">🎙</button>
    <input id="q" placeholder="Ask anything — “does ashwagandha actually work?”" autocomplete="off">
    <button class="btn send" id="send">Ask</button>
  </div>
  <div class="toggles">
    <label><input type="checkbox" id="speak" checked> Speak replies aloud</label>
    <label><input type="checkbox" id="auto"> Hands-free conversation</label>
  </div>
</div>

<script src="/auth.js" defer></script>
<script>
(function(){
  'use strict';
  var API = '/api/brain';
  var agents = [], current = null, sessionId = null, history = [];
  var chatEl = document.getElementById('chat');
  var qEl = document.getElementById('q');
  var micBtn = document.getElementById('mic');

  function el(cls, text){ var d=document.createElement('div'); d.className='msg '+cls; d.innerHTML=linkify(text); chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; return d; }
  function linkify(t){ return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/(https?:\/\/[^\s)]+)/g, function(u){ return '<a href="'+u+'" target="_blank" rel="noopener">'+u.replace(/^https?:\/\/(www\.)?/,'').slice(0,42)+'</a>'; }); }

  function renderAgents(){
    var bar = document.getElementById('agentbar'); bar.innerHTML='';
    agents.forEach(function(a){
      var b=document.createElement('button'); b.className='agentchip'+(current&&current.id===a.id?' active':''); b.textContent=a.name+(a.level==='product'?' · product':a.level==='collection'?' · collection':'');
      b.onclick=function(){ current=a; sessionId=null; history=[]; chatEl.innerHTML=''; renderAgents(); greet(); };
      bar.appendChild(b);
    });
  }
  function greet(){ if(current && current.greeting){ el('agent', current.greeting); maybeSpeak(current.greeting); } }

  // ── Voice output: ElevenLabs via /api/brain?action=tts, fallback browser TTS
  var audioEl = null;
  async function maybeSpeak(text){
    if(!document.getElementById('speak').checked) return;
    var clean = text.replace(/https?:\/\/\S+/g,'the product page').replace(/[*_#`]/g,'');
    try{
      var r = await fetch(API+'?action=tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:clean})});
      if(r.ok && (r.headers.get('content-type')||'').indexOf('audio')>-1){
        var blob=await r.blob(); if(audioEl) audioEl.pause();
        audioEl=new Audio(URL.createObjectURL(blob));
        audioEl.onended=maybeAutoListen; audioEl.play(); return;
      }
    }catch(e){}
    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(clean);
      var v=(current&&current.voice)||{};
      u.rate=v.rate||1; u.pitch=v.pitch||1;
      var voices=window.speechSynthesis.getVoices();
      var pick=voices.find(function(x){return /en-IN|India/i.test(x.lang+x.name);})||voices.find(function(x){return /en/i.test(x.lang);});
      if(pick) u.voice=pick;
      u.onend=maybeAutoListen;
      window.speechSynthesis.speak(u);
    }
  }
  function maybeAutoListen(){ if(document.getElementById('auto').checked) startListening(); }

  // ── Voice input: Web Speech API
  var rec=null, listening=false;
  function startListening(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ el('agent','Voice input is not supported in this browser — Chrome or Edge work best. Text works everywhere.'); return; }
    if(listening){ rec && rec.stop(); return; }
    rec=new SR(); rec.lang='en-IN'; rec.interimResults=false; rec.maxAlternatives=1;
    listening=true; micBtn.classList.add('listening'); micBtn.textContent='■';
    rec.onresult=function(e){ var t=e.results[0][0].transcript; qEl.value=t; ask(); };
    rec.onerror=function(){ stopUi(); };
    rec.onend=function(){ stopUi(); };
    rec.start();
  }
  function stopUi(){ listening=false; micBtn.classList.remove('listening'); micBtn.textContent='🎙'; }

  async function ask(){
    var msg=qEl.value.trim(); if(!msg||!current) return;
    qEl.value=''; el('user', msg);
    history.push({role:'user',content:msg});
    var t=document.createElement('div'); t.className='typing'; t.textContent=current.name+' is thinking…'; chatEl.appendChild(t); chatEl.scrollTop=chatEl.scrollHeight;
    try{
      var r=await fetch(API+'?action=agent-chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({agent_id:current.id, session_id:sessionId, message:msg, history:history.slice(-10), context:{page:location.href, ctx:new URLSearchParams(location.search).get('ctx')}})});
      var j=await r.json();
      t.remove();
      if(j.ok){ sessionId=j.session_id; history.push({role:'agent',content:j.reply}); var m=el('agent', j.reply); m.classList.add('speaking'); setTimeout(function(){m.classList.remove('speaking');},1200); maybeSpeak(j.speak||j.reply); }
      else el('agent','Hmm, something went wrong: '+(j.error||'unknown')+'. Try again?');
    }catch(e){ t.remove(); el('agent','I could not reach the brain just now — please try again in a moment.'); }
  }

  document.getElementById('send').onclick=ask;
  qEl.addEventListener('keydown',function(e){ if(e.key==='Enter') ask(); });
  micBtn.onclick=startListening;

  fetch(API+'?action=agents').then(function(r){return r.json();}).then(function(j){
    agents=(j.agents&&j.agents.length)?j.agents:[{id:'agent_vahdam',name:'Vahdam',level:'brand',greeting:'Namaste! Ask me anything about our teas.',voice:{}}];
    var want=new URLSearchParams(location.search).get('agent');
    current=agents.find(function(a){return a.id===want;})||agents[0];
    renderAgents(); greet();
  }).catch(function(){ agents=[{id:'agent_vahdam',name:'Vahdam',level:'brand',greeting:'Namaste! Ask me anything about our teas.',voice:{}}]; current=agents[0]; renderAgents(); greet(); });
})();
</script>
</body>
</html>
