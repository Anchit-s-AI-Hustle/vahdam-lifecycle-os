<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knowledge Base · VAHDAM Lifecycle OS</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="/auth.js?v=20260609" defer></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0a1410;color:#e8ede9;min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 24px 60px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:#AB8743;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
  h1{font-family:'Lora',serif;font-size:34px;font-weight:600;letter-spacing:-.02em}
  h1 em{font-style:italic;color:#AB8743}
  .sub{color:#9aaaa1;font-size:14px;line-height:1.6;margin-top:8px;max-width:820px}
  /* tabs */
  .tabs{display:flex;gap:6px;margin-top:22px;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:8px;font-size:13.5px;font-weight:600;color:#9aaaa1;background:transparent;border:1px solid rgba(171,135,67,.18);cursor:pointer;font-family:inherit;transition:all .14s}
  .tab:hover{color:#e8ede9}
  .tab.active{color:#0a1410;background:#AB8743;border-color:#AB8743}
  .subtabs{display:flex;gap:6px;margin-top:14px}
  .subtab{padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:#9aaaa1;background:transparent;border:none;cursor:pointer;font-family:inherit}
  .subtab:hover{color:#e8ede9}
  .subtab.active{color:#FBF5EA;background:rgba(171,135,67,.16)}
  .panel{margin-top:22px}
  /* gallery */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .card{background:#0f1d18;border:1px solid rgba(171,135,67,.18);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s}
  .card:hover{transform:translateY(-3px);border-color:#AB8743}
  .card .frame{height:170px;background:#fff;overflow:hidden;position:relative}
  .card .frame iframe{width:200%;height:340px;border:0;transform:scale(.5);transform-origin:top left;pointer-events:none}
  .card .meta{padding:12px 14px}
  .card .brand{font-weight:700;font-size:14px;color:#FBF5EA}
  .card .subj{font-size:12px;color:#9aaaa1;margin-top:3px;line-height:1.4;max-height:34px;overflow:hidden}
  .card .date{font-size:10.5px;color:#5d6e64;margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
  .chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(171,135,67,.14);color:#cdb98a;margin-top:6px}
  .count{font-size:12px;color:#5d6e64;margin:0 0 14px}
  /* empty state */
  .empty-kb{background:#0f1d18;border:1px dashed rgba(171,135,67,.3);border-radius:14px;padding:40px 32px;text-align:center}
  .empty-kb h3{font-family:'Lora',serif;font-size:20px;color:#FBF5EA;font-weight:600;margin-bottom:8px}
  .empty-kb p{color:#9aaaa1;font-size:13.5px;line-height:1.6;max-width:560px;margin:0 auto 18px}
  .kb-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9px;background:#AB8743;color:#0a1410;font-weight:600;font-size:13px;text-decoration:none}
  .kb-cta.ghost{background:transparent;border:1px solid rgba(171,135,67,.4);color:#cdd8d2}
  .loading{color:#9aaaa1;font-size:13px;padding:30px;text-align:center}
  /* modal */
  #kbm{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.72);backdrop-filter:blur(8px)}
  #kbm.open{display:flex}
  .kbm-card{background:#0f1d18;border:1px solid rgba(171,135,67,.25);border-radius:14px;width:100%;max-width:760px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .kbm-h{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(171,135,67,.18)}
  .kbm-h .t{font-weight:600;color:#FBF5EA;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kbm-act{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid rgba(171,135,67,.4);background:transparent;color:#cdd8d2;cursor:pointer;text-decoration:none}
  .kbm-body{overflow:auto;padding:0;background:#fff}
  .kbm-body iframe{width:100%;height:70vh;border:0;background:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="dot"></span> Knowledge Base</div>
  <h1>Design &amp; Creative <em>Knowledge Base</em></h1>
  <p class="sub">A growing library of mailers and ads — ours and our competitors' — to reference, benchmark, and seed future campaign creation. Pick a source, then a channel.</p>

  <div class="tabs" id="srcTabs">
    <button class="tab" data-src="vahdam">VAHDAM</button>
    <button class="tab" data-src="competitor">Competitor Benchmarking</button>
    <button class="tab" data-src="manual">📚 Manual Knowledge</button>
  </div>
  <div class="subtabs" id="chanTabs">
    <button class="subtab" data-chan="mailers">✉ Mailers</button>
    <button class="subtab" data-chan="ads">📣 Ads</button>
  </div>

  <!-- Manual Knowledge form (shown only when source = manual) -->
  <div id="kbManualForm" style="display:none; margin-top:22px; background:#0f1d18; border:1px solid rgba(171,135,67,.18); border-radius:14px; padding:18px 20px">
    <div style="font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:#5d6e64; font-weight:600; margin-bottom:10px">Add a source</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:stretch">
      <input id="kbManualUrl" type="url" placeholder="https://… blog · tweet · article · video" style="flex:1; min-width:260px; background:#0a1410; border:1px solid rgba(171,135,67,.25); border-radius:9px; color:#e8ede9; padding:11px 13px; font-family:inherit; font-size:13.5px">
      <input id="kbManualTags" type="text" placeholder="tags (comma-sep, optional)" style="min-width:200px; background:#0a1410; border:1px solid rgba(171,135,67,.25); border-radius:9px; color:#e8ede9; padding:11px 13px; font-family:inherit; font-size:13.5px">
      <button id="kbManualAdd" class="kb-cta" style="border:0; cursor:pointer; font-family:inherit">Ingest with AI</button>
    </div>
    <div id="kbManualStatus" style="font-size:12.5px; color:#9aaaa1; min-height:18px; margin-top:10px"></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<!-- Preview modal -->
<div id="kbm" aria-hidden="true">
  <div class="kbm-card">
    <div class="kbm-h">
      <span class="t" id="kbm-title"></span>
      <button class="kbm-act" id="kbm-dl">Download .html</button>
      <button class="kbm-act" id="kbm-close">×</button>
    </div>
    <div class="kbm-body"><iframe id="kbm-frame" sandbox=""></iframe></div>
  </div>
</div>

<script>
(function(){
  const API='/api/competitor';
  const $=(id)=>document.getElementById(id);
  const esc=(s)=>(s||'').replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate=(iso)=>{const d=new Date(iso);return isNaN(d)?(iso||'—'):d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});};
  const state={src:'competitor',chan:'mailers',emails:null,knowledge:null};
  const htmlCache={};

  function setActive(){
    document.querySelectorAll('#srcTabs .tab').forEach(b=>b.classList.toggle('active',b.dataset.src===state.src));
    document.querySelectorAll('#chanTabs .subtab').forEach(b=>b.classList.toggle('active',b.dataset.chan===state.chan));
    // Hide channel tabs + show ingest form when in manual mode
    document.getElementById('chanTabs').style.display = state.src==='manual' ? 'none' : '';
    document.getElementById('kbManualForm').style.display = state.src==='manual' ? '' : 'none';
    location.hash = state.src==='manual' ? 'manual' : (state.src+(state.chan==='ads'?'-ads':''));
  }

  // ─── Top VAHDAM emails: list + bulk import ─────────────────────────
  state.topEmails = null;
  async function fetchTopEmails(force){
    if(state.topEmails && !force) return state.topEmails;
    try{ const r=await fetch('/api/kb/top-emails?limit=200'); const d=await r.json(); state.topEmails = d.items||[]; }
    catch{ state.topEmails=[]; }
    return state.topEmails;
  }
  function fmtPct(v){ if(v==null) return '—'; return (Number(v)*100).toFixed(1)+'%'; }
  function fmtRev(v){ if(v==null) return '—'; const n=Number(v); if(!isFinite(n)) return '—'; return n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}); }
  function renderTopEmails(p, items){
    const importBlock = `
      <details style="background:#0f1d18; border:1px solid rgba(171,135,67,.18); border-radius:12px; padding:14px 18px; margin-bottom:18px">
        <summary style="cursor:pointer; font-weight:600; color:#FBF5EA; font-size:13.5px">⬆ Import top emails (paste JSON or CSV)</summary>
        <p style="font-size:12.5px; color:#9aaaa1; margin:10px 0">
          Each row needs at minimum <code style="color:#AB8743">subject</code> and <code style="color:#AB8743">body_text</code>. Optional:
          <code style="color:#AB8743">sent_at, preheader, market, segment, campaign_type, open_rate, click_rate, conversion_rate, revenue, send_count, tags, notes</code>.
          Rates can be 0–1 or 0–100 (auto-detected).
        </p>
        <textarea id="kbTopPaste" rows="8" placeholder='[
  {"subject":"Single-Estate Darjeeling — 25% off this week", "body_text":"Hand-picked, garden-fresh in 72 hours…", "market":"US", "campaign_type":"Sale", "open_rate":0.42, "click_rate":0.08, "revenue":12500, "send_count":50000}
]' style="width:100%; background:#0a1410; border:1px solid rgba(171,135,67,.25); border-radius:9px; color:#e8ede9; padding:10px 12px; font-family:monospace; font-size:12px"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px; align-items:center; flex-wrap:wrap">
          <button id="kbTopImport" class="kb-cta" style="border:0; cursor:pointer; font-family:inherit">Import</button>
          <span id="kbTopStatus" style="font-size:12.5px; color:#9aaaa1"></span>
        </div>
      </details>`;
    if(!items.length){
      p.innerHTML = importBlock + emptyState(
        'No top VAHDAM emails seeded yet',
        'Feed the historical winners (min 50 with metrics) above — open rate, CTR, revenue. They become style + voice anchors for every new mailer the Studio generates.',
        '', ''
      );
    } else {
      p.innerHTML = importBlock +
        `<p class="count">${items.length} top mailers seeded · sorted by recency</p>
         <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px" id="kbTopGrid"></div>`;
      document.getElementById('kbTopGrid').innerHTML = items.map(it=>{
        const tags=(it.tags||[]).slice(0,4).map(t=>'<span class="chip">'+esc(t)+'</span>').join(' ');
        return `<div class="card" style="cursor:auto; padding:14px 16px">
          <div style="font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:#5d6e64; font-weight:700; margin-bottom:4px">${esc(it.market||'—')} · ${esc(it.campaign_type||'—')} · ${esc(fmtDate(it.sent_at||it.added_at))}</div>
          <div class="brand" style="font-size:14px">${esc(it.subject)}</div>
          ${it.preheader?'<div style="font-size:12px; color:#9aaaa1; margin-top:3px">'+esc(it.preheader)+'</div>':''}
          <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; margin-top:10px; padding:10px 0; border-top:1px solid rgba(171,135,67,.08); border-bottom:1px solid rgba(171,135,67,.08)">
            <div><div style="font-size:9px; color:#5d6e64; text-transform:uppercase; letter-spacing:.06em">Open</div><div style="color:#FBF5EA; font-weight:600; font-size:13px">${fmtPct(it.open_rate)}</div></div>
            <div><div style="font-size:9px; color:#5d6e64; text-transform:uppercase; letter-spacing:.06em">CTR</div><div style="color:#FBF5EA; font-weight:600; font-size:13px">${fmtPct(it.click_rate)}</div></div>
            <div><div style="font-size:9px; color:#5d6e64; text-transform:uppercase; letter-spacing:.06em">Revenue</div><div style="color:#AB8743; font-weight:600; font-size:13px">${fmtRev(it.revenue)}</div></div>
          </div>
          ${it.body_text?'<p style="color:#cdd8d2; font-size:12px; line-height:1.55; margin-top:8px; max-height:80px; overflow:hidden">'+esc(it.body_text.slice(0,280))+(it.body_text.length>280?'…':'')+'</p>':''}
          ${tags?'<div style="margin-top:8px">'+tags+'</div>':''}
        </div>`;
      }).join('');
    }
    // Wire the importer
    document.getElementById('kbTopImport').addEventListener('click', importTopEmails);
  }
  async function importTopEmails(){
    const ta=document.getElementById('kbTopPaste'), status=document.getElementById('kbTopStatus'), btn=document.getElementById('kbTopImport');
    const raw=(ta.value||'').trim();
    if(!raw){ status.textContent='Paste JSON or CSV first.'; return; }
    let items;
    try{ items = JSON.parse(raw); if(!Array.isArray(items)) items=[items]; }
    catch{ items = parseCsv(raw); }
    if(!items || !items.length){ status.textContent='Could not parse — JSON array or CSV with headers expected.'; return; }
    btn.disabled=true; btn.style.opacity='0.6'; status.textContent='Importing '+items.length+' rows…';
    try{
      const r=await fetch('/api/kb/top-emails?bulk=1',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
      const d=await r.json();
      if(!r.ok || !d.ok){ status.textContent='Failed: '+(d.error||r.statusText); return; }
      status.textContent='Imported '+d.inserted+(d.rejected?(' · skipped '+d.rejected+' (missing subject/body_text)'):'');
      ta.value='';
      await fetchTopEmails(true);
      if(state.src==='vahdam' && state.chan==='mailers') render();
    }catch(err){ status.textContent='Error: '+err.message; }
    finally{ btn.disabled=false; btn.style.opacity=''; }
  }
  // Minimal CSV → array of objects (header row, comma separator, quoted-fields supported)
  function parseCsv(text){
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2) return null;
    const splitRow = (line) => {
      const out=[]; let cur='', q=false;
      for(let i=0;i<line.length;i++){ const c=line[i];
        if(c==='"'){ if(q && line[i+1]==='"'){ cur+='"'; i++; } else q=!q; }
        else if(c===',' && !q){ out.push(cur); cur=''; }
        else cur+=c;
      } out.push(cur); return out.map(s=>s.trim());
    };
    const headers = splitRow(lines[0]).map(h=>h.toLowerCase());
    return lines.slice(1).map(line=>{
      const cols=splitRow(line); const obj={};
      headers.forEach((h,i)=>{ if(cols[i]!==undefined && cols[i]!=='') obj[h]=cols[i]; });
      return obj;
    });
  }

  // ─── Manual knowledge: ingest + render ───────────────────────────────
  async function fetchKnowledge(force){
    if(state.knowledge && !force) return state.knowledge;
    try{ const r=await fetch('/api/kb/list?limit=200'); const d=await r.json(); state.knowledge = d.items||[]; }
    catch{ state.knowledge=[]; }
    return state.knowledge;
  }
  async function ingestManual(){
    const urlEl=$('kbManualUrl'), tagsEl=$('kbManualTags'), statusEl=$('kbManualStatus'), btn=$('kbManualAdd');
    const url=(urlEl.value||'').trim();
    if(!url){ statusEl.textContent='Paste a URL first.'; return; }
    const tags=(tagsEl.value||'').split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
    btn.disabled=true; btn.style.opacity='0.6';
    statusEl.textContent='Fetching + summarizing… (5-15s)';
    try{
      const r=await fetch('/api/kb/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,tags,added_by:'dashboard'})});
      const d=await r.json();
      if(!r.ok || !d.ok){ statusEl.textContent='Failed: '+(d.error||r.statusText); return; }
      statusEl.textContent='Added: '+(d.title||url);
      urlEl.value=''; tagsEl.value='';
      await fetchKnowledge(true);
      if(state.src==='manual') render();
    }catch(err){ statusEl.textContent='Error: '+err.message; }
    finally{ btn.disabled=false; btn.style.opacity=''; }
  }
  document.getElementById('kbManualAdd').addEventListener('click', ingestManual);
  document.getElementById('kbManualUrl').addEventListener('keydown', (e)=>{ if(e.key==='Enter') ingestManual(); });

  function renderManual(p){
    const items=state.knowledge||[];
    if(!items.length){ p.innerHTML=emptyState('Nothing in the knowledge base yet','Paste any blog post, tweet, article, or video URL above. AI fetches the page, extracts the key points, and stores it here so Mailer Studio + Ad Campaigns can use it as context.','',''); return; }
    p.innerHTML = `<p class="count">${items.length} sources ingested · click any to read the summary</p>
      <div style="display:flex; flex-direction:column; gap:12px" id="kbList"></div>`;
    document.getElementById('kbList').innerHTML = items.map(it=>{
      const tags=(it.tags||[]).slice(0,5).map(t=>'<span class="chip">'+esc(t)+'</span>').join(' ');
      const kp=(it.key_points||[]).slice(0,4).map(k=>'<li style="margin:3px 0">'+esc(k)+'</li>').join('');
      return `<div class="card" style="cursor:auto; padding:16px 18px">
        <div style="display:flex; justify-content:space-between; align-items:start; gap:12px">
          <div style="flex:1; min-width:0">
            <div style="font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:#5d6e64; font-weight:700; margin-bottom:4px">${esc(it.source_type||'web')} · ${esc(fmtDate(it.added_at))}</div>
            <div class="brand" style="font-size:15px">${esc(it.title||it.url)}</div>
            ${it.author?'<div style="font-size:11.5px; color:#9aaaa1; margin-top:2px">by '+esc(it.author)+'</div>':''}
          </div>
          <a href="${esc(it.url)}" target="_blank" rel="noopener" class="kbm-act" style="text-decoration:none; flex-shrink:0">Open ↗</a>
        </div>
        ${it.summary?'<p style="color:#cdd8d2; font-size:13px; line-height:1.55; margin-top:10px">'+esc(it.summary)+'</p>':'<p style="color:#5d6e64; font-style:italic; font-size:12.5px; margin-top:10px">Status: '+esc(it.status||'pending')+'</p>'}
        ${kp?'<ul style="margin-top:8px; padding-left:18px; color:#9aaaa1; font-size:12.5px">'+kp+'</ul>':''}
        ${tags?'<div style="margin-top:8px">'+tags+'</div>':''}
      </div>`;
    }).join('');
  }

  async function fetchEmails(){
    if(state.emails)return state.emails;
    try{const r=await fetch(API+'?action=list');const d=await r.json();state.emails=d.emails||[];}catch{state.emails=[];}
    return state.emails;
  }

  function emptyState(title,body,ctaLabel,ctaHref){
    return `<div class="empty-kb"><h3>${esc(title)}</h3><p>${body}</p>${ctaHref?`<a class="kb-cta" href="${ctaHref}">${esc(ctaLabel)} →</a>`:''}</div>`;
  }

  async function render(){
    setActive();
    const p=$('panel');
    // Manual knowledge — different shape (no channel split).
    if(state.src==='manual'){
      p.innerHTML='<div class="loading">Loading knowledge base…</div>';
      await fetchKnowledge();
      renderManual(p);
      return;
    }
    // Only Competitor → Mailers has live data today (the captured emails).
    if(state.src==='competitor' && state.chan==='mailers'){
      p.innerHTML='<div class="loading">Loading captured competitor mailers…</div>';
      const emails=await fetchEmails();
      if(!emails.length){p.innerHTML=emptyState('No mailers captured yet','Competitor emails captured into the monitored inbox will appear here as a visual design library.','Open Competitor Benchmarking','/competitor-benchmarking.html');return;}
      p.innerHTML=`<p class="count">${emails.length} competitor mailers archived · click any to preview the full email</p><div class="grid" id="grid"></div>`;
      $('grid').innerHTML=emails.map(e=>`
        <div class="card" data-id="${esc(e.id)}">
          <div class="frame" data-frame="${esc(e.id)}"></div>
          <div class="meta"><div class="brand">${esc(e.brand)}</div><div class="subj">${esc(e.subject)}</div><div class="date">${esc(fmtDate(e.receivedAt))}</div>${e.promoCodes&&e.promoCodes!=='None'?`<span class="chip">🏷 ${esc(e.promoCodes.split(',')[0])}</span>`:''}</div>
        </div>`).join('');
      $('grid').querySelectorAll('.card').forEach(c=>{
        c.addEventListener('click',()=>openPreview(c.dataset.id));
        lazyThumb(c.dataset.id); // fill the mini live-HTML thumbnail
      });
      return;
    }
    if(state.src==='competitor' && state.chan==='ads'){
      p.innerHTML=emptyState('Competitor ad creatives','Captured competitor ads (image/video creative, landing URL, copy, first/last seen) will be archived here — mirroring the mailer pipeline. For now, browse live ad libraries (Meta, Google, TikTok) from the Ads tab.','Browse competitor ads','/competitor-benchmarking.html#ads');return;
    }
    if(state.src==='vahdam' && state.chan==='mailers'){
      p.innerHTML='<div class="loading">Loading top VAHDAM mailers…</div>';
      const items = await fetchTopEmails();
      renderTopEmails(p, items);
      return;
    }
    // vahdam ads
    p.innerHTML=emptyState('VAHDAM ad creatives','Your VAHDAM ad creatives + landing pages will live here as a reusable creative library. Build them in Ad Campaigns; KB archiving comes with the Phase-2 creative store.','Open Ad Campaigns','/ad-campaigns.html');
  }

  async function loadHtml(id){
    if(htmlCache[id]!==undefined)return htmlCache[id];
    try{const r=await fetch(API+'?action=html&id='+encodeURIComponent(id));const d=await r.json();htmlCache[id]=(d&&typeof d.html==='string')?d.html:'';}catch{htmlCache[id]='';}
    return htmlCache[id];
  }
  async function lazyThumb(id){
    const html=await loadHtml(id);
    const f=document.querySelector(`[data-frame="${CSS.escape(id)}"]`);
    if(f&&html){const fr=document.createElement('iframe');fr.setAttribute('sandbox','');fr.srcdoc=html;f.appendChild(fr);}
  }

  const modal=$('kbm');
  async function openPreview(id){
    const e=(state.emails||[]).find(x=>x.id===id);
    $('kbm-title').textContent=e?`${e.brand} — ${e.subject}`:'Email';
    const html=await loadHtml(id);
    $('kbm-frame').srcdoc=html||'<p style="font-family:sans-serif;padding:20px">Raw HTML not stored for this email.</p>';
    $('kbm-dl').onclick=()=>{if(!html)return;const b=new Blob([html],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(e?e.brand:'email').replace(/[^\w]+/g,'_')+'.html';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);};
    modal.classList.add('open');modal.setAttribute('aria-hidden','false');
  }
  function closeModal(){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');$('kbm-frame').srcdoc='';}
  $('kbm-close').addEventListener('click',closeModal);
  modal.addEventListener('click',(e)=>{if(e.target===modal)closeModal();});
  document.addEventListener('keydown',(e)=>{if(e.key==='Escape'&&modal.classList.contains('open'))closeModal();});

  document.querySelectorAll('#srcTabs .tab').forEach(b=>b.addEventListener('click',()=>{state.src=b.dataset.src;render();}));
  document.querySelectorAll('#chanTabs .subtab').forEach(b=>b.addEventListener('click',()=>{state.chan=b.dataset.chan;render();}));

  // Deep-link from the hash: #vahdam, #competitor, #vahdam-ads, #competitor-ads, #manual
  (function initFromHash(){
    const h=(location.hash||'').replace('#','');
    if(h==='manual'){ state.src='manual'; state.chan='mailers'; return; }
    if(h.startsWith('vahdam'))state.src='vahdam'; else state.src='competitor';
    state.chan=h.endsWith('ads')?'ads':'mailers';
  })();
  render();
})();
</script>
</body>
</html>
